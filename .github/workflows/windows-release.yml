name: windows-release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate resource packs
        shell: pwsh
        run: |
          npm run validate:pets
          npm run validate:artist

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Download fixed WebView2 runtime
        shell: pwsh
        run: |
          $cab = Join-Path $env:RUNNER_TEMP "webview2-fixed.cab"
          $meta = Join-Path $env:RUNNER_TEMP "webview2-fixed.json"
          $runtime = Join-Path $env:RUNNER_TEMP "webview2-fixed"
          npm run download:webview2-fixed -- --arch x64 --out $cab --meta $meta
          New-Item -ItemType Directory -Force -Path $runtime | Out-Null
          & expand.exe $cab "-F:*" $runtime
          "WEBVIEW2_FIXED_RUNTIME_DIR=$runtime" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Get-Content $meta

      - name: Build portable archive
        shell: pwsh
        run: |
          npm run package:portable
          npm run verify:portable

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: desktop-livecat-win11-x64
          path: release/*.zip

      - name: Attach archives to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.zip
          overwrite_files: true
